name: Python package

on:
  push:
    branches:
    - main
  pull_request:
    branches:
    - main

jobs:

  build:
    name: Build for (${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    services:
      postgres:
        image: postgres
        env:
          POSTGRES_PASSWORD: postgres_oeamdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    strategy:
      fail-fast: true
      matrix:
        os: ['ubuntu-latest']
        python-version: ['3.12']
    steps:
      - uses: actions/checkout@v6
      - name: Set up Postgres Usage
        run: |
          echo "localhost:5432:*:postgres:postgres_oeamdb" >> $HOME/.pgpass
          chmod 0600 $HOME/.pgpass
          sudo apt-get install -y postgresql-client
          psql -c 'create database _test_oeamdb_postgres;' -U postgres --host localhost
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Python info
        shell: bash -e {0}
        run: |
          which python
          python --version
      - name: Upgrade pip and install dependencies
        run: |
          python -m pip install --upgrade pip setuptools
          python -m pip install . --group dev --group publishing
          playwright install
      - name: Run unit tests
        run: python -m pytest -v
      - name: Verify that we can build the package
        run: python -m build
